*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --lion: #8B0000; --gold: #F5A623; --green: #1A6B3C;
  --sky: #1E90FF; --cream: #FFF8F0; --dark: #1A1A2E;
}
body { 
    font-family: 'Poppins', 'Iskoola Pota', 'Nirmala UI', sans-serif; 
    background: var(--cream); 
    color: var(--dark); 
    line-height: 1.6;
}

.header {
  background: linear-gradient(135deg, #8B0000, #C0392B);
  padding: 28px 20px 20px;
  position: relative; overflow: hidden;
  text-align: left;
}
.header::after {
  content: '🦁';
  position: absolute; font-size: 160px; opacity: 0.1;
  right: -20px; top: -10px;
}
.flag-bar { display: flex; gap: 4px; margin-bottom: 14px; }
.fs { height: 5px; border-radius: 3px; }
.header h1 { font-size: 26px; font-weight: 800; color: white; line-height: 1.2; margin-bottom: 4px; position: relative; z-index: 1; }
.header h1 span { color: var(--gold); }
.header p { font-size: 13px; color: rgba(255,255,255,0.9); position: relative; z-index: 1; }

.tabs {
  display: flex; background: white;
  border-bottom: 2px solid #eee; overflow-x: auto; 
  position: sticky; top: 0; z-index: 100;
}
.tab {
  padding: 13px 18px; font-size: 13px; font-weight: 600; color: #777;
  cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: all 0.3s;
}
.tab.active { color: var(--lion); border-bottom-color: var(--lion); }
